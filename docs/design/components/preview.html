<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Component Preview - Design System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        /* Tokens from tokens.json */
        --color-brand-primary: #3b82f6;
        --color-brand-primary-dark: #2563eb;
        --color-neutral-50: #f9fafb;
        --color-neutral-100: #f3f4f6;
        --color-neutral-200: #e5e7eb;
        --color-neutral-400: #9ca3af;
        --color-neutral-500: #6b7280;
        --color-neutral-600: #4b5563;
        --color-neutral-700: #374151;
        --color-neutral-900: #111827;
        --color-semantic-error: #ef4444;
        --color-semantic-success: #10b981;
        --color-surface: #ffffff;

        --spacing-1: 4px;
        --spacing-2: 8px;
        --spacing-3: 12px;
        --spacing-4: 16px;

        --font-xs: 12px;
        --font-sm: 14px;
        --font-base: 16px;

        --radius-md: 4px;
        --radius-lg: 8px;
        --radius-full: 9999px;
        --border-width-1: 1px;
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        --shadow-outline: 0 0 0 3px rgba(59, 130, 246, 0.2);
      }

      body {
        font-family: "Inter", sans-serif;
        padding: 40px;
        background-color: var(--color-neutral-50);
        color: var(--color-neutral-900);
        line-height: 1.5;
      }

      .section {
        margin-bottom: 60px;
        max-width: 800px;
      }

      h2 {
        border-bottom: 2px solid var(--color-neutral-200);
        padding-bottom: 10px;
        margin-bottom: 24px;
      }

      h3 {
        margin: 24px 0 12px 0;
        font-size: var(--font-base);
        color: var(--color-neutral-700);
      }

      /* --- Button Styles --- */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: var(--spacing-2) var(--spacing-4);
        border-radius: var(--radius-md);
        font-size: var(--font-sm);
        font-weight: 500;
        transition: all 0.2s ease;
        cursor: pointer;
        border: 1px solid transparent;
        margin-right: 8px;
        margin-bottom: 8px;
      }

      .btn-primary {
        background-color: var(--color-brand-primary);
        color: var(--color-neutral-50);
      }
      .btn-primary:hover:not(:disabled) {
        background-color: var(--color-brand-primary-dark);
      }

      .btn-secondary {
        background-color: transparent;
        border-color: var(--color-brand-primary);
        color: var(--color-brand-primary);
      }

      .btn-ghost {
        background-color: transparent;
        color: var(--color-brand-primary);
      }
      .btn-ghost:hover:not(:disabled) {
        background-color: var(--color-neutral-100);
      }

      .btn-danger {
        background-color: var(--color-semantic-error);
        color: var(--color-neutral-50);
      }

      /* --- Kanban Styles (Real Implementation) --- */
      .kanban-example {
        background-color: var(--color-neutral-100);
        padding: 40px;
        border-radius: var(--radius-lg);
        display: flex;
        gap: 20px;
        overflow-x: auto;
      }

      .column {
        width: 300px;
        min-width: 300px;
        background-color: #ebecf0;
        border-radius: var(--radius-lg);
        display: flex;
        flex-direction: column;
        padding: 12px;
        gap: 12px;
      }

      .column-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 4px;
      }

      .column-title {
        font-size: var(--font-sm);
        font-weight: 600;
        color: var(--color-neutral-600);
        text-transform: uppercase;
      }

      .column-count {
        background-color: var(--color-neutral-200);
        padding: 2px 8px;
        border-radius: var(--radius-full);
        font-size: 10px;
      }

      /* REAL KANBAN CARD STYLES */
      .kanban-card {
        background: var(--color-surface);
        border: var(--border-width-1) solid var(--color-neutral-200);
        border-radius: var(--radius-lg);
        padding: var(--spacing-3);
        margin-bottom: var(--spacing-1);
        cursor: grab;
        transition: border-color 0.2s ease;
        display: flex;
        flex-direction: column;
        text-align: left;
      }

      .kanban-card:hover {
        border-color: var(--color-neutral-400);
      }

      .kanban-card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: var(--spacing-2);
        gap: var(--spacing-2);
      }

      .kanban-card-title {
        margin: 0;
        font-size: var(--font-sm);
        font-weight: 600;
        color: var(--color-neutral-900);
        flex: 1;
      }

      .completed-badge {
        display: inline-block;
        width: 20px;
        height: 20px;
        background: var(--color-semantic-success);
        color: var(--color-surface);
        border-radius: var(--radius-full);
        text-align: center;
        line-height: 20px;
        font-size: var(--font-xs);
        flex-shrink: 0;
      }

      .kanban-card-description {
        margin: 0 0 var(--spacing-3) 0;
        font-size: var(--font-xs);
        color: var(--color-neutral-600);
        line-height: 1.4;
      }

      .kanban-card-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: auto;
        padding-top: var(--spacing-2);
        border-top: var(--border-width-1) solid var(--color-neutral-100);
      }

      .kanban-card-date {
        font-size: var(--font-xs);
        color: var(--color-neutral-500);
      }

      .kanban-card-actions {
        display: flex;
        gap: var(--spacing-2);
        opacity: 0;
        transition: opacity 0.2s ease;
      }

      .kanban-card:hover .kanban-card-actions {
        opacity: 1;
      }

      .kanban-card-action-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: var(--spacing-1);
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: var(--radius-md);
        font-size: 16px;
        color: var(--color-neutral-500);
        width: 28px;
        height: 28px;
      }

      .kanban-card-action-btn:hover {
        background-color: var(--color-neutral-100);
        color: var(--color-neutral-900);
      }

      .kanban-card-action-btn.delete:hover {
        background-color: rgba(239, 68, 68, 0.1);
        color: var(--color-semantic-error);
      }

      /* --- Toast/Modal Animations --- */
      @keyframes slideIn {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      .toast-container {
        position: fixed;
        bottom: 24px;
        right: 24px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        z-index: 1000;
      }

      .toast {
        min-width: 300px;
        padding: var(--spacing-3) var(--spacing-4);
        background: white;
        border-radius: var(--radius-md);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        display: flex;
        align-items: center;
        gap: var(--spacing-3);
        border-left: 4px solid;
        font-size: var(--font-sm);
        animation: slideIn 0.3s ease-out;
      }
      .toast-success {
        border-color: var(--color-semantic-success);
      }
      .toast-error {
        border-color: var(--color-semantic-error);
      }
    </style>
  </head>
  <body>
    <div class="toast-container">
      <div class="toast toast-success" role="alert">
        <span style="color: var(--color-semantic-success); font-weight: bold">✓</span>
        <span class="toast-message">Task created successfully!</span>
      </div>
    </div>

    <div class="section">
      <h2>Kanban (Real Implementation)</h2>
      <div class="kanban-example">
        <!-- Column 1 -->
        <div class="column">
          <div class="column-header">
            <span class="column-title">In Progress</span>
            <span class="column-count">1</span>
          </div>

          <div class="kanban-card">
            <div class="kanban-card-header">
              <h4 class="kanban-card-title">Setup design system</h4>
            </div>
            <p class="kanban-card-description">
              Implement the design tokens for the task card component.
            </p>
            <div class="kanban-card-footer">
              <small class="kanban-card-date">Apr 15, 2024</small>
              <div class="kanban-card-actions">
                <button class="kanban-card-action-btn">✎</button>
                <button class="kanban-card-action-btn delete">🗑️</button>
              </div>
            </div>
          </div>

          <button class="btn btn-ghost" style="width: 100%; margin: 0; padding: 4px">
            + Add Task
          </button>
        </div>

        <!-- Column 2 -->
        <div class="column">
          <div class="column-header">
            <span class="column-title">Done</span>
            <span class="column-count">1</span>
          </div>

          <div class="kanban-card">
            <div class="kanban-card-header">
              <h4 class="kanban-card-title">Initial Research</h4>
              <span class="completed-badge">✓</span>
            </div>
            <div class="kanban-card-footer">
              <small class="kanban-card-date">Apr 10, 2024</small>
              <div class="kanban-card-actions">
                <button class="kanban-card-action-btn">✎</button>
                <button class="kanban-card-action-btn delete">🗑️</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Buttons</h2>
      <button class="btn btn-primary">Primary Button</button>
      <button class="btn btn-ghost">Ghost Button</button>
      <button class="btn btn-danger">Danger Button</button>
    </div>

    <div class="section">
      <h2>Forms</h2>
      <div class="form-field">
        <label class="label">Task Name</label>
        <input class="input" type="text" placeholder="e.g. Clean the room" />
      </div>
      <div class="form-field">
        <label class="label">Description</label>
        <textarea class="input" rows="3" placeholder="Add details..."></textarea>
      </div>
    </div>
  </body>
</html>
